<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Mode</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: #1a1a1a; color: white; text-align: center; padding: 20px;">

    <h1>Tap Miner</h1>
    <h2 id="coin-display">0</h2>
    
    <!-- နှိပ်မရတဲ့ ပြဿနာ စစ်ဆေးဖို့ Status Log -->
    <div id="debug-log" style="background: #333; padding: 10px; margin: 10px; border-radius: 5px; color: yellow;">
        Status: Initializing...
    </div>

    <button id="tap-btn" style="width: 150px; height: 150px; border-radius: 50%; font-size: 50px; cursor: pointer;">🪙</button>

    <script>
        const log = (msg) => {
            document.getElementById('debug-log').innerText = msg;
            console.log(msg);
        };

        try {
            const btn = document.getElementById('tap-btn');
            let coins = 0;

            btn.onclick = () => {
                coins++;
                document.getElementById('coin-display').innerText = coins;
                log("Success: Button Clicked! Coins: " + coins);
            };

            log("System Ready. Click the coin.");
        } catch(e) {
            log("Error: " + e.message);
        }
    </script>
</body>
</html>
