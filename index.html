<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tap Miner</title>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Adsgram Script -->
    <script src="https://sad.adsgram.org/js/advblocks.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 400px; margin: auto; }
        .coin-btn {
            width: 150px; height: 150px;
            border-radius: 50%; background: gold;
            border: 5px solid #d4af37; font-size: 50px;
            cursor: pointer; margin: 30px auto;
            box-shadow: 0 0 20px gold;
        }
        .coin-btn:active { transform: scale(0.95); }
        .nav-tabs { display: flex; justify-content: space-around; margin-top: 20px; }
        .tab-btn { background: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: gold; color: black; }
        .page { display: none; margin-top: 20px; background: #2a2a2a; padding: 20px; border-radius: 10px; }
        .page.active { display: block; }
        input { padding: 10px; width: 80%; margin: 10px 0; background: #333; color: white; border: 1px solid #555; border-radius: 5px; }
        button.action-btn { background: #0078ff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🪙 My Tap Miner 🪙</h2>
        <h1 id="coin-display">0</h1>

        <!-- Nav Tabs -->
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('game')">Game</button>
            <button class="tab-btn" onclick="switchTab('refer')">Refer</button>
            <button class="tab-btn" onclick="switchTab('ads')">Ads</button>
            <button class="tab-btn" onclick="switchTab('withdraw')">Withdraw</button>
        </div>

        <!-- Game Page -->
        <div id="game-page" class="page active">
            <button class="coin-btn" onclick="tapCoin()">🪙</button>
            <p>Tap to Earn (+1 Coin)</p>
        </div>

        <!-- Refer Page -->
        <div id="refer-page" class="page">
            <h3>👥 Invite Friends</h3>
            <p>Total Referred: <span id="refer-count">0</span></p>
            <input type="text" id="refer-link" readonly>
            <button class="action-btn" onclick="copyReferLink()">Copy Link</button>
        </div>

        <!-- Ads Page -->
        <div id="ads-page" class="page">
            <h3>📺 Watch Ads & Earn</h3>
            <p>Watch a video to get +500 Coins!</p>
            <button class="action-btn" style="background: #28a745;" onclick="watchAd()">Watch Ad Video</button>
        </div>

        <!-- Withdraw Page -->
        <div id="withdraw-page" class="page">
            <h3>💰 Withdraw TON</h3>
            <p>Min Withdraw: 50,000 Coins</p>
            <input type="text" id="wallet-input" placeholder="Enter TON Wallet Address">
            <button class="action-btn" onclick="requestWithdraw()">Submit Request</button>
            <p id="withdraw-status" style="margin-top:15px; color: gold;"></p>
        </div>
    </div>

    <!-- ဂိမ်းလုပ်ဆောင်ချက် ကုတ်များအားလုံးကို ဤနေရာတွင် စုစည်းပေးထားပါသည် -->
    <script>
        // Supabase Initialize
        const SUPABASE_URL = "https://cgnnsmpbwhddewgfpjtu.supabase.co";
        const SUPABASE_KEY = "Sb_publishable_YNnCR7OnTdXNWp1b6A6l8g_PXg40GfX";
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        // Telegram Web App Initialize
        const tg = window.Telegram.WebApp;
        tg.expand();

        let userTgId = tg.initDataUnsafe?.user?.id || 123456789; 
        let username = tg.initDataUnsafe?.user?.username || "GuestPlayer";
        let userCoins = 0;

        // Adsgram Block ID (စမ်းသပ်ဖို့ Test ID ထည့်ပေးထားပါတယ်)
        const AdController = window.Adsgram ? window.Adsgram.createAd({ blockId: "int-4161" }) : null;

        async function loadUserData() {
            if (!supabase) return;

            // User ဒေတာ ဆွဲယူမယ်
            let { data: user, error } = await supabase.from('users').select('*').eq('telegram_id', userTgId).single();

            // အကောင့်မရှိသေးရင် အသစ်ဆောက်မယ်
            if (error && error.code === 'PGRST116') {
                let startParam = tg.initDataUnsafe?.start_param;
                let referrerId = startParam ? parseInt(startParam) : null;

                const { data: newUser } = await supabase.from('users').insert([
                    { telegram_id: userTgId, username: username, coins: 0, referred_by: referrerId }
                ]).select().single();
                user = newUser;
            }

            userCoins = user ? user.coins : 0;
            document.getElementById('coin-display').innerText = userCoins;
            document.getElementById('wallet-input').value = user?.wallet_address || "";
            if(user?.withdraw_status !== 'none') {
                document.getElementById('withdraw-status').innerText = `Status: ${user.withdraw_status}`;
            }

            // Referral Link ထုတ်ပေးမယ်
            document.getElementById('refer-link').value = `https://t.me/Mytapminer_bot/app?startapp=${userTgId}`;
            
            // Referral Count ပြမယ်
            let { data: refData } = await supabase.from('referral_counts').select('count').eq('referred_by', userTgId).single();
            document.getElementById('refer-count').innerText = refData ? refData.count : 0;
        }

        // 🪙 နှိပ်ရင် ၁ ခုစီပဲ တက်မယ်
        async function tapCoin() {
            userCoins += 1;
            document.getElementById('coin-display').innerText = userCoins;
            await supabase.from('users').update({ coins: userCoins }).eq('telegram_id', userTgId);
        }

        // 📺 ကြော်ငြာကြည့်ရင် ၅၀၀ တိုးပေးမယ်
        function watchAd() {
            if (!AdController) {
                alert("Ads network not ready.");
                return;
            }
            AdController.show().then(async (result) => {
                userCoins += 500; 
                document.getElementById('coin-display').innerText = userCoins;
                await supabase.from('users').update({ coins: userCoins }).eq('telegram_id', userTgId);
                alert("Reward Added! +500 Coins");
            }).catch((err) => {
                alert("Ad failed to load or skipped.");
            });
        }

        // 💰 Withdraw တောင်းဆိုချက်ပို့မယ်
        async function requestWithdraw() {
            let wallet = document.getElementById('wallet-input').value.trim();
            if (!wallet) {
                alert("Please enter a valid TON wallet address!");
                return;
            }
            if (userCoins < 50000) {
                alert("Minimum withdraw is 50,000 coins!");
                return;
            }

            await supabase.from('users').update({ 
                wallet_address: wallet, 
                withdraw_status: 'Pending' 
            }).eq('telegram_id', userTgId);

            document.getElementById('withdraw-status').innerText = "Status: Pending (Admin will review)";
            alert("Withdraw Request Submitted!");
        }

        function switchTab(tabName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`${tabName}-page`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function copyReferLink() {
            let copyText = document.getElementById("refer-link");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("Referral link copied!");
        }

        loadUserData();
    </script>
</body>
</html>
