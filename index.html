<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Tap Miner</title>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 400px; margin: auto; }
        .coin-btn {
            width: 150px; height: 150px;
            border-radius: 50%; background: gold;
            border: 5px solid #d4af37; font-size: 50px;
            cursor: pointer; margin: 30px auto;
            box-shadow: 0 0 20px gold;
            display: block;
        }
        .coin-btn:active { transform: scale(0.95); }
        .nav-tabs { display: flex; justify-content: space-around; margin-top: 20px; }
        .tab-btn { background: #333; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: gold; color: black; }
        .page { display: none; margin-top: 20px; background: #2a2a2a; padding: 20px; border-radius: 10px; }
        .page.active { display: block; }
        input { padding: 10px; width: 85%; margin: 10px 0; background: #333; color: white; border: 1px solid #555; border-radius: 5px; }
        .action-btn { background: #0078ff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: inline-block; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🪙 My Tap Miner 🪙</h2>
        <h1 id="coin-display">0</h1>

        <!-- Nav Tabs -->
        <div class="nav-tabs">
            <button id="tab-game" class="tab-btn active" onclick="switchTab('game')">Game</button>
            <button id="tab-refer" class="tab-btn" onclick="switchTab('refer')">Refer</button>
            <button id="tab-withdraw" class="tab-btn" onclick="switchTab('withdraw')">Withdraw</button>
        </div>

        <!-- Game Page -->
        <div id="game-page" class="page active">
            <button class="coin-btn" onclick="tapCoin()">🪙</button>
            <p>Tap to Earn (+1 Coin)</p>
        </div>

        <!-- Refer Page -->
        <div id="refer-page" class="page">
            <h3>👥 Invite Friends</h3>
            <input type="text" id="refer-link" readonly>
            <button class="action-btn" onclick="copyReferLink()">Copy Link</button>
        </div>

        <!-- Withdraw Page -->
        <div id="withdraw-page" class="page">
            <h3>💰 Withdraw TON</h3>
            <p>Min Withdraw: 50,000 Coins</p>
            <input type="text" id="wallet-input" placeholder="Enter TON Wallet Address">
            <button class="action-btn" onclick="requestWithdraw()">Submit Request</button>
            <p id="withdraw-status" style="margin-top:15px; color: gold; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        // Supabase Setup
        const SUPABASE_URL = "https://cgnnsmpbwhddewgfpjtu.supabase.co";
        const SUPABASE_KEY = "Sb_publishable_YNnCR7OnTdXNWp1b6A6l8g_PXg40GfX";
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        // Telegram Setup
        const tg = window.Telegram.WebApp;
        if(tg) {
            tg.expand();
            tg.ready();
        }

        let userTgId = tg?.initDataUnsafe?.user?.id || 999999999; 
        let username = tg?.initDataUnsafe?.user?.username || "Player";
        let userCoins = 0;

        async function loadUserData() {
            if (!supabase) return;
            try {
                // User ရှိမရှိ စစ်ဆေးပြီး ဒေတာယူမယ်
                let { data: user, error } = await supabase.from('users').select('*').eq('telegram_id', userTgId).single();

                if (error && error.code === 'PGRST116') {
                    let startParam = tg?.initDataUnsafe?.start_param;
                    let referrerId = startParam ? parseInt(startParam) : null;

                    const { data: newUser } = await supabase.from('users').insert([
                        { telegram_id: userTgId, username: username, coins: 0, referred_by: referrerId }
                    ]).select().single();
                    user = newUser;
                }

                userCoins = user ? user.coins : 0;
                document.getElementById('coin-display').innerText = userCoins;
                document.getElementById('wallet-input').value = user?.wallet_address || "";
                
                if(user?.withdraw_status && user.withdraw_status !== 'none') {
                    document.getElementById('withdraw-status').innerText = `Status: ${user.withdraw_status}`;
                }

                document.getElementById('refer-link').value = `https://t.me/Mytapminer_bot/app?startapp=${userTgId}`;
            } catch(e) {
                // Error တက်ရင်လည်း ဂိမ်းမရပ်အောင် ဖမ်းထားတယ်
                console.log("Error loading user data:", e);
            }
        }

        // 🪙 Coin တိုးမည့်စနစ်
        async function tapCoin() {
            userCoins += 1;
            document.getElementById('coin-display').innerText = userCoins;
            
            // Database ထဲ သိမ်းမယ်
            if (supabase) {
                await supabase.from('users').update({ coins: userCoins }).eq('telegram_id', userTgId);
            }
        }

        // 💰 Withdraw တောင်းဆိုချက်
        async function requestWithdraw() {
            let wallet = document.getElementById('wallet-input').value.trim();
            if (!wallet) {
                alert("Please enter TON wallet address!");
                return;
            }
            if (userCoins < 50000) {
                alert("Minimum withdraw is 50,000 coins!");
                return;
            }

            if (supabase) {
                await supabase.from('users').update({ 
                    wallet_address: wallet, 
                    withdraw_status: 'Pending' 
                }).eq('telegram_id', userTgId);
            }

            document.getElementById('withdraw-status').innerText = "Status: Pending";
            alert("Withdraw Requested!");
        }

        // Tab ပြောင်းလဲခြင်း စနစ်အမှန်
        function switchTab(tabName) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabName + '-page').style.display = 'block';
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        function copyReferLink() {
            let copyText = document.getElementById("refer-link");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Referral link copied!");
        }

        // ဂိမ်းပွင့်တာနဲ့ Run မယ်
        console.log("Version 2.0 Ready");

        loadUserData();
    </script>
</body>
</html>
